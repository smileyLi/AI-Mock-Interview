<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI面试系统</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="stylesheet" href="css/style.css?v=12">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2 class="sidebar-title">📋 面试系统</h2>
                <button class="sidebar-toggle" id="sidebarToggle" title="收起侧边栏">
                    <span></span>
                </button>
            </div>

            <button class="new-interview-btn" id="newInterviewBtn">
                <span class="btn-icon">✨</span>
                <span class="btn-text">新的面试</span>
            </button>

            <!-- 简历上传区域 -->
            <div class="sidebar-resume-upload" id="resumeUploadArea">
                <div class="sidebar-resume-header">
                    <span class="sidebar-resume-title">📄 简历上传</span>
                    <span id="resumeStatusText" class="sidebar-resume-status">未上传</span>
                </div>
                <div class="sidebar-resume-actions">
                    <input type="file" id="resumeFileInput" class="resume-file-hidden" accept=".pdf,.doc,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
                    <label for="resumeFileInput" class="btn btn-sidebar-resume">📎 上传简历</label>
                    <button id="clearResumeBtn" class="btn btn-sm btn-outline btn-hidden">清除</button>
                </div>
                <div id="resumeHint" class="sidebar-resume-hint">支持 PDF、Word（.docx）</div>
            </div>

            <div class="sidebar-section-title">📜 面试历史</div>

            <div class="history-list" id="historyListSidebar">
                <div class="history-empty" id="historyEmptySidebar">
                    <p>暂无面试记录</p>
                </div>
            </div>
        </aside>

        <!-- 侧边栏展开按钮（收起时显示） -->
        <button class="sidebar-expand-btn" id="sidebarExpandBtn" title="展开历史记录">
            <span>📋</span>
        </button>

        <!-- 主内容区 -->
        <main class="main-content">
            <header class="main-header">
                <h1>🎯 AI模拟面试系统</h1>
                <p id="jobTitle">Java后端开发工程师岗位</p>
            </header>

            <!-- 面试界面 -->
            <div class="interview-panel" id="interviewPanel">
                <!-- 对话显示区域 -->
                <div class="chat-area" id="chatArea">
                    <div class="message system">
                        <span class="role">🤖 系统</span>
                        <p>点击左侧「新的面试」开始模拟面试，或点击历史记录查看过往面试详情。</p>
                    </div>
                </div>

                <!-- 岗位选择区域 -->
                <div class="job-select-area" id="jobSelectArea">
                    <span class="job-select-label">选择面试岗位：</span>
                    <select id="jobSelect" class="job-select">
                        <option value="java_backend">☕ Java后端开发工程师</option>
                        <option value="web_frontend">🎨 Web前端开发工程师</option>
                    </select>
                </div>

                <!-- 控制按钮区域 -->
                <div class="controls">
                    <button id="startBtn" class="btn btn-primary btn-large">🎤 开始面试</button>
                    <button id="recordBtn" class="btn btn-record" disabled>🎙️ 按住说话</button>
                    <button id="endBtn" class="btn btn-danger" disabled>✖️ 结束面试</button>
                    <button type="button" id="viewReportBtn" class="btn btn-primary btn-hidden" disabled>📄 查看面试报告</button>
                </div>

                <!-- 状态提示 -->
                <div class="status" id="status">
                    选择岗位并上传简历（可选），然后点击「开始面试」
                </div>

                <!-- 手动输入备用 -->
                <div class="manual-input">
                    <input type="text" id="manualInput" placeholder="或者在这里输入文字..." disabled>
                    <button id="sendBtn" class="btn btn-secondary" disabled>发送</button>
                </div>
            </div>

            <!-- 历史详情查看界面（初始隐藏） -->
            <div class="detail-panel hidden" id="detailPanel">
                <div class="detail-header">
                    <button class="btn btn-danger" id="deleteHistoryBtnDetail">🗑️ 删除记录</button>
                </div>

                <div class="detail-content" id="detailContent">
                    <!-- 历史详情将动态填充 -->
                </div>
            </div>
        </main>
    </div>

    

    <!-- 面试总结报告 -->
    <div id="summaryReportModal" class="modal">
        <div class="modal-content modal-large modal-summary-report">
            <div class="modal-header">
                <h2>📄 面试总结报告</h2>
                <span class="close-summary" title="关闭">&times;</span>
            </div>
            <div class="modal-body modal-body--report">
                <div id="summaryReportBody" class="summary-report-body"></div>
            </div>
            <div class="modal-footer">
                <button type="button" id="summaryDownloadPdfBtn" class="btn btn-primary">下载 PDF</button>
                <button type="button" id="summaryModalCloseBtn" class="btn btn-secondary">关闭</button>
            </div>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div id="deleteConfirmModal" class="modal">
        <div class="modal-content modal-delete">
            <div class="modal-header">
                <h2>🗑️ 确认删除</h2>
                <span class="close-delete" title="关闭">&times;</span>
            </div>
            <div class="modal-body">
                <p>确定要删除这条面试记录吗？</p>
            </div>
            <div class="modal-footer">
                <button type="button" id="deleteCancelBtn" class="btn btn-secondary">取消</button>
                <button type="button" id="deleteConfirmBtn" class="btn btn-danger">确认删除</button>
            </div>
        </div>
    </div>

    <!-- 清除简历确认弹窗 -->
    <div id="clearResumeModal" class="modal">
        <div class="modal-content modal-delete">
            <div class="modal-header">
                <h2>🗑️ 确认清除</h2>
                <span class="close-clear-resume" title="关闭">&times;</span>
            </div>
            <div class="modal-body">
                <p>确定要清除已保存的简历吗？</p>
            </div>
            <div class="modal-footer">
                <button type="button" id="clearResumeCancelBtn" class="btn btn-secondary">取消</button>
                <button type="button" id="clearResumeConfirmBtn" class="btn btn-danger">确认清除</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" crossorigin="anonymous"></script>
    <script src="js/api_client.js?v=7"></script>
    <script src="js/audio_recorder.js?v=5"></script>
    <script src="js/audio_player.js?v=5"></script>
    <script src="js/summary_report_render.js?v=5"></script>
    <script src="js/app.js?v=12"></script>
</body>
</html>
